name: CI
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
permissions:
  contents: read
  id-token: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v17
        with:
          determinate: true
      - uses: DeterminateSystems/magic-nix-cache-action@v9
      - name: Install devenv
        run: nix profile add nixpkgs#devenv
      - name: Run tests
        run: devenv test
  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v17
        with:
          determinate: true
      - uses: DeterminateSystems/magic-nix-cache-action@v9
      - name: Install devenv
        run: nix profile add nixpkgs#devenv
      - name: Publish to LuaRocks
        run: |
          rockspec=$(ls yalms-*.rockspec | head -n1)
          devenv shell -- luarocks upload "$rockspec" --api-key "$LUAROCKS_API_KEY"
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
