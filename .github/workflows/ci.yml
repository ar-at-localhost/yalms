name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      # Install devenv
      - name: Install devenv
        run: nix profile add nixpkgs#devenv

      # Run tests
      - name: Run tests
        run: devenv test

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install devenv
        run: nix profile add nixpkgs#devenv

      # Publish LuaRocks package
      - name: Publish to LuaRocks
        run: devenv shell --command luarocks upload yalms-*.rockspec
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
